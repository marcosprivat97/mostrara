services:
  - type: web
    name: vitrinepro-api
    env: node
    buildCommand: pnpm install && pnpm run build
    startCommand: cd artifacts/api-server && pnpm start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: PNPM_VERSION
        value: 10.x
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
