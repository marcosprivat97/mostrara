version: '3.8'
services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    platform: linux/arm64 # Force native ARM performance
    restart: always
    shm_size: '2gb'
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://152.67.55.69:8080
      - AUTHENTICATION_API_KEY=mostrara_global_key_2026_super_secret
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_EXPOSE_IN_SWAGGER=true
      - DOCKER_ENV=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:mostrara_pass@postgres:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_PROVIDER=redis
      - SESSION_STORE_TYPE=database
      - INSTANCE_AUTO_START=false
    volumes:
      - ./instances:/evolution/instances
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    platform: linux/arm64 # Match host arch
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mostrara_pass
      - POSTGRES_DB=evolution
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    platform: linux/arm64 # Match host arch
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./redis_data:/data
