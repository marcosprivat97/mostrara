version: '3.8'
services:
  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution-api
    restart: always
    shm_size: '512mb'
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://147.15.38.136:8080
      - AUTHENTICATION_API_KEY=mostrara_global_key_2026_super_secret
      - AUTHENTICATION_TYPE=apikey
      - DOCKER_ENV=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:mostrara_pass@postgres:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_PROVIDER=redis
      - SESSION_STORE_TYPE=database
      - INSTANCE_AUTO_START=false
      - NODE_OPTIONS=--max-old-space-size=512
      - WEBHOOK_GLOBAL_ENABLED=false
      - WEBHOOK_EVENTS_APPLICATION_STARTUP=false
      - CONFIG_SESSION_PHONE_CLIENT=Mostrara_App
      - CONFIG_SESSION_PHONE_NAME=Chrome
    volumes:
      - ./instances:/evolution/instances
    depends_on:
      - postgres
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mostrara_pass
      - POSTGRES_DB=evolution
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./redis_data:/data
